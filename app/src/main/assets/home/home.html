<!-- ════════════════════════════════════════════════════════
     home.html  ·  LastWave Home Screen
     CSS  → home/home.css
     Logic→ home/home.js
     ════════════════════════════════════════════════════════ -->

<!-- .home-screen fills [data-screen="home"] which screen_home()
     forces to overflow:hidden + flex-column so that #dailyMixList
     is the ONLY scroll container on this screen. -->
<div class="home-screen">

  <!-- ── No user yet ──────────────────────────────────────── -->
  <div id="homeUsernameSection" class="home-username-card hidden">
    <div class="home-username-label">Last.fm Username</div>
    <div class="home-username-row">
      <input
        type="text"
        id="homeUsernameInput"
        class="home-text-input"
        placeholder="Enter username…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="home-go-btn" onclick="saveUsername()">Go</button>
    </div>
  </div>

  <!-- ── Header row ──────────────────────────────────────── -->
  <div id="homeHeader" class="home-header-row hidden">
    <div class="home-header-user">
      <div class="home-username-pill">
        <span class="home-header-username" id="homeHeaderUsername">—</span>
      </div>
    </div>
    <div class="home-header-timer" id="homeListenTimer">
      <span class="material-symbols-rounded home-timer-icon">headphones</span>
      <span class="home-timer-value" id="homeTimerValue">––:––:––:––</span>
    </div>
  </div>

  <!-- ── Stats card ──────────────────────────────────────── -->
  <div id="userProfileCard" class="home-stats-card hidden">
    <div class="home-scrobbles-row">
      <div class="home-scrobbles-balancer" aria-hidden="true"></div>
      <div class="home-scrobbles-center">
        <span class="home-scrobbles-count" id="profileScrobbles">—</span>
        <span class="home-scrobbles-label">Scrobbles</span>
      </div>
      <button class="home-scrobbles-arrow" onclick="navigateTo('genres')" aria-label="View genres">
        <span class="material-symbols-rounded">arrow_forward_ios</span>
      </button>
    </div>
    <div class="home-stats-divider"></div>
    <div class="home-stats-row">
      <div class="home-stat-item">
        <div class="home-stat-label">Tracks</div>
        <div class="home-stat-value" id="statTracks">—</div>
      </div>
      <div class="home-stat-sep"></div>
      <div class="home-stat-item">
        <div class="home-stat-label">Artists</div>
        <div class="home-stat-value" id="statArtists">—</div>
      </div>
      <div class="home-stat-sep"></div>
      <div class="home-stat-item">
        <div class="home-stat-label">Albums</div>
        <div class="home-stat-value" id="statAlbums">—</div>
      </div>
    </div>
  </div>

  <!-- ── List card ───────────────────────────────────────── -->
  <!-- .home-mix-card is flex:1 — it fills every remaining pixel.
       .home-list-wrapper inside it provides the height:100% flex
       chain required for #dailyMixList to be the only scroller. -->
  <div id="dailyMixCard" class="home-mix-card hidden">

    <!-- Fixed header — never scrolls away -->
    <div class="home-mix-header">
      <span class="home-mix-title">List</span>
      <div class="home-sort-wrap" id="homeSortWrap">
        <button class="home-sort-btn" id="homeSortBtn"
                onclick="toggleSortMenu()"
                aria-label="Sort options" aria-haspopup="true">
          <span class="material-symbols-rounded">sort</span>
          <span class="home-sort-label" id="homeSortLabel">Recent</span>
          <span class="material-symbols-rounded home-sort-chevron" id="homeSortChevron">expand_more</span>
        </button>
        <div class="home-sort-menu hidden" id="homeSortMenu" role="menu">
          <button class="home-sort-option active" id="sortOptRecent"
                  onclick="setSortMode('recent')" role="menuitem">
            <span class="material-symbols-rounded">schedule</span>
            Recent
            <span class="material-symbols-rounded home-sort-check" id="checkRecent">check</span>
          </button>
          <button class="home-sort-option" id="sortOptMostPlayed"
                  onclick="setSortMode('mostPlayed')" role="menuitem">
            <span class="material-symbols-rounded">bar_chart</span>
            Most Played
            <span class="material-symbols-rounded home-sort-check hidden" id="checkMostPlayed">check</span>
          </button>
          <button class="home-sort-option" id="sortOptLast7Days"
                  onclick="setSortMode('last7days')" role="menuitem">
            <span class="material-symbols-rounded">date_range</span>
            Last 7 Days
            <span class="material-symbols-rounded home-sort-check hidden" id="checkLast7Days">check</span>
          </button>
          <button class="home-sort-option" id="sortOptLast30Days"
                  onclick="setSortMode('last30days')" role="menuitem">
            <span class="material-symbols-rounded">calendar_month</span>
            Last 30 Days
            <span class="material-symbols-rounded home-sort-check hidden" id="checkLast30Days">check</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Static divider between header and scroll zone -->
    <div class="home-list-divider"></div>

    <!-- .home-list-wrapper: flex:1 height chain so #dailyMixList
         is the ONLY element that ever scrolls.
         JS toggles .limited on #dailyMixList for non-Recent tabs:
           Recent     → flex:1; overflow-y:auto  (fills wrapper, full scroll)
           Other tabs → height:calc(5*72px); overflow-y:auto  (bounded) -->
    <div class="home-list-wrapper">
      <div id="dailyMixList" class="home-mix-list">
        <!-- Populated by home.js — full dataset, no limit -->
      </div>
    </div>

  </div>

  <!-- ── Loading skeleton ────────────────────────────────── -->
  <div id="homeSkeleton" class="home-skeleton hidden">
    <div class="skel-card">
      <div class="skel-line skel-short"></div>
      <div class="skel-line skel-tall"></div>
      <div class="skel-row" style="gap:12px">
        <div class="skel-block"></div><div class="skel-block"></div><div class="skel-block"></div>
      </div>
    </div>
    <div class="skel-card">
      <div class="skel-line skel-medium"></div>
      <div class="skel-track"></div><div class="skel-track"></div>
      <div class="skel-track"></div><div class="skel-track"></div>
      <div class="skel-track"></div>
    </div>
  </div>

</div>
